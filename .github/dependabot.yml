version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - ylabonte
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - ylabonte
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
    groups:
      aiohttp-stack:
        patterns:
          - "aiohttp"
          - "yarl"
          - "multidict"
          - "propcache"
      dev-tools:
        patterns:
          - "ruff"
          - "mypy"
          - "pre-commit"
          - "pytest*"
          - "pytest-*"
          - "aioresponses"
