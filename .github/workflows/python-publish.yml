name: PyPI Package Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/test.yml

  lint:
    uses: ./.github/workflows/lint.yml

  publish:
    needs: [test, lint]
    runs-on: ubuntu-latest
    environment: pypi

    permissions:
      id-token: write
      attestations: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: pip install build hatch-vcs

      - name: Build package
        run: python -m build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
